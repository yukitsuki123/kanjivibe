<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .liquid-glass {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.02) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .neon-glow {
            box-shadow: 0 0 30px rgba(210, 187, 255, 0.25);
        }
        .organic-blob {
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface font-body text-on-surface selection:bg-primary/30 min-h-screen overflow-hidden flex flex-col">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 w-full z-50 bg-slate-950/40 backdrop-blur-xl border-b border-white/15 shadow-[0_4px_30px_rgba(0,0,0,0.1)] flex justify-between items-center px-6 py-4">
<div class="flex items-center gap-4">
<button class="active:scale-95 transition-transform hover:bg-white/5 p-2 rounded-full">
<span class="material-symbols-outlined text-purple-200">grid_view</span>
</button>
<span class="font-headline tracking-tighter text-2xl uppercase font-bold text-purple-300 drop-shadow-[0_0_8px_rgba(210,187,255,0.4)]">Kanjivibe</span>
</div>
<div class="flex items-center gap-2">
<span class="label-sm font-label uppercase tracking-widest text-slate-400 bg-white/5 px-3 py-1 rounded-full">Daily Goal: 15/20</span>
<button class="active:scale-95 transition-transform hover:bg-white/5 p-2 rounded-full">
<span class="material-symbols-outlined text-purple-200">account_circle</span>
</button>
</div>
</header>
<!-- Main Content: The Canvas -->
<main class="flex-grow flex items-center justify-center relative px-6 mt-16 mb-24 overflow-hidden">
<!-- Background Ambient Elements -->
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/10 organic-blob blur-3xl animate-pulse"></div>
<div class="absolute bottom-1/4 right-1/4 w-[30rem] h-[30rem] bg-tertiary/5 organic-blob blur-[100px]"></div>
<!-- Kanji Focus Card (The Signature Component) -->
<div class="relative w-full max-w-sm aspect-[3/4] group cursor-pointer">
<!-- Liquid Swipe Indication (Left/Right hints) -->
<div class="absolute -left-12 top-1/2 -translate-y-1/2 opacity-20 group-hover:opacity-60 transition-opacity">
<span class="material-symbols-outlined text-4xl text-error">close</span>
</div>
<div class="absolute -right-12 top-1/2 -translate-y-1/2 opacity-20 group-hover:opacity-60 transition-opacity">
<span class="material-symbols-outlined text-4xl text-secondary">check_circle</span>
</div>
<!-- The Card itself -->
<div class="liquid-glass neon-glow h-full w-full rounded-[2.5rem] p-8 flex flex-col justify-between items-center text-center relative overflow-hidden">
<!-- Card Header -->
<div class="w-full flex justify-between items-start z-10">
<div class="bg-primary/20 text-primary text-[10px] font-bold uppercase tracking-widest px-3 py-1 rounded-full border border-primary/20">
                        N5 Mastery
                    </div>
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined">volume_up</span>
</button>
</div>
<!-- Central Content: Kanji -->
<div class="flex flex-col items-center justify-center z-10">
<h1 class="text-[10rem] font-headline font-light leading-none text-secondary drop-shadow-[0_0_20px_rgba(211,251,255,0.4)]">水</h1>
<p class="font-label text-xl tracking-[0.4em] text-on-surface-variant uppercase mt-4">mizu</p>
</div>
<!-- Footer Hint -->
<div class="w-full flex flex-col items-center gap-4 z-10">
<div class="flex gap-2">
<span class="w-2 h-2 rounded-full bg-primary shadow-[0_0_8px_rgba(210,187,255,0.8)]"></span>
<span class="w-2 h-2 rounded-full bg-white/10"></span>
<span class="w-2 h-2 rounded-full bg-white/10"></span>
</div>
<p class="label-md font-label text-on-surface-variant/60 flex items-center gap-2">
<span class="material-symbols-outlined text-sm">touch_app</span>
                        Tap to reveal meaning
                    </p>
</div>
<!-- Back Side Hint (Peek) -->
<div class="absolute bottom-[-50%] w-[120%] h-1/2 bg-surface-container-highest/80 backdrop-blur-md rounded-[2.5rem] border-t border-white/10 p-6 flex flex-col gap-4 group-hover:bottom-[-20%] transition-all duration-500 ease-out">
<div class="w-12 h-1 bg-white/20 rounded-full self-center mb-2"></div>
<div class="flex justify-between items-center">
<span class="font-label text-xs uppercase tracking-widest text-primary">Meaning</span>
<span class="text-lg font-bold">Water</span>
</div>
</div>
</div>
<!-- Interaction Logic Label (Design Guide) -->
<div class="absolute -bottom-16 left-0 right-0 text-center">
<span class="text-[10px] font-label uppercase tracking-tighter text-slate-500 opacity-50">Swipe Left to Discard • Swipe Right to Master • Tap to Flip</span>
</div>
</div>
</main>
<!-- Contextual Details Section (Bento Lite) -->
<section class="px-6 pb-24 grid grid-cols-2 gap-4 max-w-md mx-auto">
<div class="bg-surface-container-low rounded-3xl p-5 border border-white/5 flex flex-col gap-2">
<span class="label-sm font-label text-on-surface-variant/60 uppercase">Strokes</span>
<div class="flex items-end gap-2">
<span class="text-3xl font-headline font-bold text-primary">4</span>
<span class="label-sm text-on-surface-variant pb-1">Primary</span>
</div>
<!-- Decorative stroke sequence representation -->
<div class="flex gap-1 mt-2">
<div class="h-1 flex-grow bg-primary/40 rounded-full"></div>
<div class="h-1 flex-grow bg-primary/20 rounded-full"></div>
<div class="h-1 flex-grow bg-primary/10 rounded-full"></div>
<div class="h-1 flex-grow bg-primary/5 rounded-full"></div>
</div>
</div>
<div class="bg-surface-container-low rounded-3xl p-5 border border-white/5 flex flex-col gap-2">
<span class="label-sm font-label text-on-surface-variant/60 uppercase">Frequency</span>
<div class="flex items-end gap-2">
<span class="text-3xl font-headline font-bold text-tertiary">#126</span>
</div>
<p class="text-[10px] text-on-surface-variant leading-tight">Commonly used in daily conversations.</p>
</div>
</section>
<!-- Bottom Navigation Anchor -->
<nav class="fixed bottom-8 w-full z-50 flex justify-around items-center px-4">
<div class="bg-slate-900/20 backdrop-blur-2xl w-[90%] max-w-md rounded-full border border-white/15 shadow-[0_0_20px_rgba(210,187,255,0.1)] flex justify-around items-center py-2">
<button class="text-slate-500 p-3 hover:text-cyan-200 transition-all active:scale-90">
<span class="material-symbols-outlined">dashboard</span>
</button>
<button class="bg-purple-500/20 text-purple-200 p-3 rounded-full shadow-[0_0_15px_rgba(210,187,255,0.3)] active:scale-90">
<span class="material-symbols-outlined">style</span>
</button>
<button class="text-slate-500 p-3 hover:text-cyan-200 transition-all active:scale-90">
<span class="material-symbols-outlined">widgets</span>
</button>
<button class="text-slate-500 p-3 hover:text-cyan-200 transition-all active:scale-90">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</nav>

<div class="fixed inset-0 pointer-events-none opacity-[0.03] mix-blend-overlay">
<img class="w-full h-full object-cover" data-alt="abstract organic liquid flowing shapes with subtle grain and noise texture for background overlay" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCDkIN710IktQsqgA-0-uA6drtfN65uLxNSm-DJiQx0K77qzPVIbYxvKl66zsVj4kWS05dEcR925fsDf8-NXeiWDgq3aZDIOwmdc8dIEbzuNVll-XzJoPLQOuInuA983hJqrV3-kfa8G9tPrlqr0QwgL1g-J4dYNiYgybIrcGWSpLIseHPbXacC4dAcg36vzBGCbAYjW_St1iWwQ65XAwclEpDGqLEJq3-3VfOj3EtJGTnrWEwITPmT0hSua6JIoeVhppPZQKPjkSxR"/>
</div>
</body></html>
